<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido de Flores</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body >

  <div class="container my-4">
    <h2 class="text-center">🪻 Haz tu Pedido 🪻</h2>

<!-- Formulario principal -->
<form id="formPedido" class="mb-4">
  <div class="mb-3">
    <label class="form-label">Nombre del cliente:</label>
    <input type="text" id="nombre" class="form-control">
  </div>

  <div class="mb-3">
    <label class="form-label">Dirección de entrega:</label>
    <input type="text" id="direccion" class="form-control">
  </div>

  <div class="mb-3">
    <label class="form-label">Tipo de arreglo floral:</label>
    <select id="arreglo" class="form-select">
      <option value="">--Seleccione--</option>
      <option value="Condolencias (Arreglo Blanco)">Condolencias (Arreglo Blanco)</option>
      <option value="Felicidades (Arreglo Amarillo)">Felicidades (Arreglo Amarillo)</option>
      <option value="Conquista (Rosas y tulipanes)">Conquista (Rosas y tulipanes)</option>
      <option value="Perdón (Ramo buchón de rosas rojas)">Perdón (Ramo buchón de rosas rojas)</option>
    </select>
  </div>

  <!-- Contenedor Bootstrap para fechas -->
  <div class="container border rounded p-3 bg-light mb-3">
    <div class="mb-3">
      <label class="form-label">Fecha de pedido:</label>
      <input type="date" id="fechaPedido" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Fecha de entrega:</label>
      <input type="date" id="fechaEntrega" class="form-control">
    </div>

    <button type="button" class="btn btn-success" onclick="verificarFechas()">Verificar Fechas</button>
  </div>

  <!-- Botón final del formulario -->
  <button type="button" class="btn btn-primary w-100" onclick="hacerPedido()">Hacer Pedido</button>
</form><br><br>



<!-- Personalización de tarjeta -->
<h3 class="text-center ">Personaliza tu tarjeta (Opcional)</h3>
<form id="formTarjeta" class="mb-4">
  <label class="form-label">Opciones de tarjeta:</label>
  <div class="form-check">
    <input type="checkbox" id="op1" class="form-check-input">
    <label class="form-check-label">Sobre con timbre</label>
  </div>
  <div class="form-check">
    <input type="checkbox" id="op2" class="form-check-input">
    <label class="form-check-label">Sobre con ramillete</label>
  </div>
  <div class="form-check">
    <input type="checkbox" id="op3" class="form-check-input">
    <label class="form-check-label">Tarjeta con fragancia</label>
  </div><br>

  <div class="mb-3 mt-3">
    <label class="form-label">Temática de la tarjeta:</label>
    <select id="tematica" class="form-select">
      <option value="">--Seleccione--</option>
      <option value="aniversario">Aniversario</option>
      <option value="condolencias">Condolencias</option>
      <option value="felicidades">Felicidades</option>
      <option value="arrepentimiento">Conquista</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">De:</label>
    <input type="text" id="de" class="form-control">
  </div>

  <div class="mb-3">
    <label class="form-label">Mensaje:</label>
    <input type="text" id="mensaje" class="form-control">
  </div>

  <button type="button" class="btn btn-secondary" onclick="personalizarTarjeta()">Aplicar Personalización</button>
  <button type="button" class="btn btn-info" onclick="vistaPreviaTarjeta()">Vista Previa</button>

  <!-- Nuevo botón -->
  <button type="button" class="btn btn-primary mt-3 w-100" onclick="agregarTarjeta()">Agregar tarjeta personalizada</button>
</form>


  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <!-- Tu script personalizado debe ir al final -->
  <script src="js/script.js"></script>
</body>
</html>
